<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Exploding Kittens</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

    <h1>Exploding Kittens</h1>

    <div class="card" id="login">
        <h2>Unirse a la partida</h2>

        <input id="name" placeholder="Nombre">
        <input id="password" placeholder="Clave de sala" type="password">

        <button onclick="joinGame()">Unirse</button>

        <p id="status"></p>
    </div>

    <div id="game" style="display:none;">

        <div class="top-bar">
            <h2 id="playerTitle"></h2>
            <button onclick="logoutLocal()">Cerrar sesión local</button>
        </div>

        <div id="waitingRoom" class="card">
            <h3>Sala de espera</h3>
            <p>Esperando jugadores antes de iniciar la partida.</p>
            <h3>Jugadores listos</h3>
            <div id="waitingPlayers"></div>
            <button onclick="startGame()">Iniciar partida</button>
            
        </div>

        <div id="finishedArea" class="card" style="display:none;">
            <h3>Partida finalizada</h3>
            <p>Revisa el resultado y la lista de jugadores.</p>
        </div>

        <div id="gameArea" class="table-layout" style="display:none;">


            <section class="table-center">

                <div id="players" class="seats"></div>

                <div id="gameInfo"></div>

                <button id="drawButton" onclick="drawCard()" disabled>Robar carta</button>
                <button onclick="playPair()">Jugar par seleccionado</button>

                <p id="actionStatus"></p>
            </section>

            <section class="hand-area">
                <h3>Tu mano</h3>
                <div id="hand"></div>
            </section>

        </div>

        <div id="targetModal" class="modal" style="display:none;">
            <div class="modal-content">
                <h3>Elige un jugador objetivo</h3>
                <div id="targetOptions"></div>
                <button onclick="closeTargetModal()">Cancelar</button>
            </div>
        </div>

    </div>

    <script src="/app.js"></script>
</body>
</html>
